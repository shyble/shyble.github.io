<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #58a6ff;
            --accent2: #3fb950;
            --accent3: #d2a8ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        nav {
            padding: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.95rem;
        }

        nav a:hover { color: var(--accent); }

        nav .site-name {
            color: var(--text);
            font-weight: 600;
            font-size: 1.1rem;
        }

        nav .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        header {
            padding: 4rem 0 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--muted);
            font-size: 1.15rem;
        }

        section {
            margin-bottom: 3rem;
        }

        h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tag-group-label {
            width: 100%;
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
            margin-top: 0.5rem;
        }

        .tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .tag.lang { border-color: var(--accent); color: var(--accent); }
        .tag.ai { border-color: var(--accent3); color: var(--accent3); }
        .tag.infra { border-color: var(--accent2); color: var(--accent2); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .card-content {
            display: flex;
            gap: 1.25rem;
            align-items: center;
        }

        .card-img {
            width: 64px;
            height: 64px;
            border-radius: 0.5rem;
            object-fit: cover;
            flex-shrink: 0;
        }

        .card h3 {
            font-size: 1.05rem;
            margin-bottom: 0.25rem;
        }

        .card h3 a {
            color: var(--accent);
            text-decoration: none;
        }

        .card h3 a:hover {
            text-decoration: underline;
        }

        .card p {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .card .meta {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 0.5rem;
        }

        .card .meta span {
            margin-right: 1rem;
        }

        .contact {
            text-align: center;
            padding: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
        }

        .contact a {
            color: var(--accent);
            text-decoration: none;
            font-size: 1.1rem;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        .contact .links {
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--muted);
            font-size: 0.85rem;
        }

        /* Blog styles */
        .post-list {
            list-style: none;
            padding: 0;
        }

        .post-list li {
            margin-bottom: 1.5rem;
        }

        .post-list a {
            color: var(--accent);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .post-list a:hover {
            text-decoration: underline;
        }

        .post-list .post-date {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .post-list .post-excerpt {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        article.post {
            margin: 2rem 0;
        }

        article.post h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        article.post .post-date {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        article.post p {
            margin-bottom: 1rem;
        }

        article.post a {
            color: var(--accent);
        }

        article.post code {
            background: var(--surface);
            padding: 0.15rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.9rem;
        }

        article.post pre {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            margin-bottom: 1rem;
        }

        article.post pre code {
            background: none;
            padding: 0;
        }

        article.post img {
            max-width: 100%;
            border-radius: 0.5rem;
        }

        article.post h2, article.post h3 {
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            border: none;
        }

        article.post ul, article.post ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
            color: var(--muted);
        }

        article.post blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/" class="site-name">Shyble</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/aware/">AWARE</a>
                <a href="/blog">Blog</a>
            </div>
        </nav>

        {{ content }}

        <footer>
            &copy; 2026 Shyble
        </footer>
    </div>
</body>
</html>
